services:
  redis:
    image: redis:7-alpine
    container_name: repo-insight-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repo-insight-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env.production
    depends_on:
      - redis
    restart: always

volumes:
  redis_data: